name: "SOP 錄入表單"
description: "新增一份標準作業程序 (SOP)"
title: "[SOP] "  # 這行會自動把 [SOP] 預填在 Add a title 欄位中
labels: ["SOP"]
body:
  - type: markdown
    attributes:
      value: |
        本表單為 POC 測試階段，送出後所有文件將統一寫入 `docs/sop/` 目錄。
        **請直接於上方標題列接續輸入 SOP 名稱。**
  - type: dropdown
    id: brand
    attributes:
      label: "廠牌/系統"
      options:
        - Dell
        - Juniper
        - Cisco
        - Proxmox
        - VMware
        - 其他
    validations:
      required: true
  - type: textarea
    id: content
    attributes:
      label: "SOP 內文"
    validations:
      required: true
