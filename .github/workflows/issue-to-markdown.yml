name: Convert SOP Issue to Markdown
on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  generate-markdown:
    if: contains(github.event.issue.labels.*.name, 'SOP')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Parse Issue and Create File
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // 1. 直接抓取 Issue 原生標題 (例如 "[SOP] Dell 伺服器重開機")
            const rawTitle = context.payload.issue.title;
            // 把開頭的 "[SOP] " 清理掉，只留下真正的標題
            const title = rawTitle.replace(/^\[SOP\]\s*/i, '').trim();
            
            // 2. 抓取表單內文
            const body = context.payload.issue.body;
            const getField = (fieldName) => {
              const regex = new RegExp(`### ${fieldName}\\s+([\\s\\S]*?)(?=###|$)`, 'i');
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            };

            const brand = getField('廠牌/系統');
            const content = getField('SOP 內文');
            
            // 組裝 YAML
            const fileContent = `---
            title: "${title}"
            brand: "${brand}"
            date: "${new Date().toISOString().split('T')[0]}"
            ---
            
            ${content}
            `;
            
            const targetDir = 'docs/sop';
            // 檔名使用清理過的標題
            const safeTitle = title.replace(/\s+/g, '-').replace(/[^\w-]/g, '');
            const fileName = `${targetDir}/${new Date().toISOString().split('T')[0]}-${safeTitle}.md`;
            
            if (!fs.existsSync(targetDir)){
                fs.mkdirSync(targetDir, { recursive: true });
            }
            fs.writeFileSync(fileName, fileContent.replace(/^\s+/gm, ''));

      - name: Commit and Push to Repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/sop/
          git commit -m "docs: auto-generate POC SOP from Issue #${{ github.event.issue.number }}"
          git push

      - name: Close the Issue Automatically
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed'
            })
